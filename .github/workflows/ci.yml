name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
  pull_request:
    branches: [ main, develop ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: Unit Tests (Ultra Fast)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: wp
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer
          coverage: none

      - name: Validate composer.json
        run: composer validate --strict

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Run Unit Tests
        run: vendor/bin/phpunit --testsuite=Unit

  integration-tests:
    name: Integration & Pest Tests (Docker)
    needs: unit-tests
    if: github.ref_name == 'main' || github.base_ref == 'main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Setup environment files
        run: |
          echo "ENVIROMENT=dev" > .env
          if [ -f "wp/.env.example" ]; then
            cp wp/.env.example wp/.env
          fi

      - name: Build and start Docker containers
        run: |
          docker compose -f infrastructure/docker-compose.dev.yml up --build -d

      - name: Run WP provision & setup script
        run: |
          docker compose -f infrastructure/docker-compose.dev.yml exec -T app /app/wp/bin/setup.sh

      - name: Run Pest test suite
        run: |
          docker compose -f infrastructure/docker-compose.dev.yml exec -T app composer --working-dir=/app/wp test

      - name: Stop Docker containers
        if: always()
        run: |
          docker compose -f infrastructure/docker-compose.dev.yml down -v